<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olad & Synsor — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: #000; }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .login-box {
      background: #fff;
      padding: 48px 32px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-group input, .form-group select {
      width: 100%;
      height: 48px;
      border: 1px solid #CCCCCC;
      padding: 0 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      outline: none;
      border-radius: 0;
    }

    .form-group input:focus { border-color: #000; }

    .btn-full {
      width: 100%;
      background: #000;
      color: #fff;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      transition: background 200ms;
    }

    .btn-full:hover { background: #333; }

    .error-msg {
      color: #D32F2F;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .dashboard { display: none; }

    .dash-nav {
      background: #000;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dash-logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #fff;
      letter-spacing: 3px;
    }

    .btn-logout {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .btn-logout:hover { color: #fff; border-color: #fff; }

    .dash-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .dash-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .dash-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }

    .upload-form {
      background: #fff;
      border: 1px solid #CCCCCC;
      padding: 32px;
      margin-bottom: 40px;
    }

    .upload-form h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #CCCCCC;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .img-preview {
      width: 100%;
      height: 200px;
      border: 2px dashed #CCCCCC;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: #F5F5F5;
    }

    .img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .img-preview-text {
      font-size: 13px;
      color: #999;
      text-align: center;
    }

    .img-preview input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-status {
      font-size: 13px;
      color: #333;
      margin-bottom: 16px;
      min-height: 20px;
      padding: 8px;
      background: #F5F5F5;
      border-left: 3px solid #000;
      display: none;
    }

    .products-list h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #CCCCCC;
    }

    .product-item {
      background: #fff;
      border: 1px solid #CCCCCC;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .product-item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border: 1px solid #CCCCCC;
    }

    .product-item-info { flex: 1; }

    .product-item-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .product-item-price {
      font-size: 13px;
      color: #333;
    }

    .product-item-cat {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-delete {
      background: #D32F2F;
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #999;
      font-size: 14px;
      background: #fff;
      border: 1px solid #CCCCCC;
    }

    @media (max-width: 479px) {
      .form-row { grid-template-columns: 1fr; }
      .upload-form { padding: 20px; }
      .dash-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1 class="login-logo">OLAD & SYNSOR</h1>
      <p class="login-sub">Admin Panel — Authorised Access Only</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="admin@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••">
      </div>
      <button class="btn-full" onclick="login()">Login</button>
      <p class="error-msg" id="errorMsg">Invalid email or password.</p>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <nav class="dash-nav">
      <h1 class="dash-logo">OLAD & SYNSOR</h1>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>

    <div class="dash-content">
      <h2 class="dash-title">Product Manager</h2>
      <p class="dash-sub">Add and manage products on the storefront.</p>

      <div class="upload-form">
        <h3>Add New Product</h3>

        <div class="img-preview" id="imgPreview">
          <img id="previewImg" src="" alt="">
          <div class="img-preview-text" id="previewText">
            📸 Tap to select product photo
          </div>
          <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)">
        </div>

        <div class="upload-status" id="uploadStatus"></div>

        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="e.g. Baggy Cargo Pants">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Price (₦)</label>
            <input type="number" id="productPrice" placeholder="15000">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="productCategory">
              <option value="streetwear">Streetwear</option>
              <option value="corporate">Corporate</option>
            </select>
          </div>
        </div>

        <button class="btn-full" onclick="addProduct()">Upload & Publish Product</button>
      </div>

      <div class="products-list">
        <h3>Live Products</h3>
        <div id="productsList">
          <div class="empty-state">No products yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyCqa4koTFTNxV2aps89jTRpH2EPF8GoLzE",
      authDomain: "synsor-83edc.firebaseapp.com",
      projectId: "synsor-83edc",
      storageBucket: "synsor-83edc.firebasestorage.app",
      messagingSenderId: "185298581474",
      appId: "1:185298581474:web:8d8988ac96474fd8c6ebbb"
    });

    const db = getFirestore(app);
    const auth = getAuth(app);

    const setStatus = (msg) => {
      const el = document.getElementById('uploadStatus');
      el.style.display = 'block';
      el.textContent = msg;
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadProducts();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    window.login = async () => {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById('errorMsg').style.display = 'none';
      } catch (e) {
        document.getElementById('errorMsg').style.display = 'block';
      }
    };

    window.logout = async () => { await signOut(auth); };

    window.previewPhoto = (input) => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.getElementById('previewImg');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('previewText').style.display = 'none';
      };
      reader.readAsDataURL(file);
    };

    window.addProduct = async () => {
      const name = document.getElementById('productName').value.trim();
      const price = document.getElementById('productPrice').value.trim();
      const category = document.getElementById('productCategory').value;
      const file = document.getElementById('photoInput').files[0];

      if (!name || !price || !file) {
        setStatus('⚠️ Fill all fields and select a photo.');
        return;
      }

      setStatus('Uploading photo...');

      try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'dsgefk6j');

        const res = await fetch('https://api.cloudinary.com/v1_1/dzupp2dev/image/upload', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus('❌ Cloudinary error: ' + (data.error?.message || JSON.stringify(data)));
          return;
        }

        setStatus('Photo uploaded. Saving product...');

        await addDoc(collection(db, 'products'), {
          name,
          price: Number(price),
          category,
          imageUrl: data.secure_url,
          createdAt: serverTimestamp()
        });

        setStatus('✅ Product published successfully!');

        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('photoInput').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('previewText').style.display = 'block';

        loadProducts();

      } catch (e) {
        setStatus('❌ Error: ' + e.message);
      }
    };

    window.loadProducts = async () => {
      const list = document.getElementById('productsList');
      list.innerHTML = '<p style="color:#999;font-size:13px;padding:16px;">Loading...</p>';

      try {
        const snapshot = await getDocs(collection(db, 'products'));

        if (snapshot.empty) {
          list.innerHTML = '<div class="empty-state">No products yet. Add your first product above.</div>';
          return;
        }

        list.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const p = docSnap.data();
          list.innerHTML += `
            <div class="product-item">
              <img src="${p.imageUrl}" alt="${p.name}">
              <div class="product-item-info">
                <p class="product-item-name">${p.name}</p>
                <p class="product-item-price">₦${Number(p.price).toLocaleString()}</p>
                <p class="product-item-cat">${p.category}</p>
              </div>
              <button class="btn-delete" onclick="deleteProduct('${docSnap.id}')">Delete</button>
            </div>
          `;
        });
      } catch(e) {
        list.innerHTML = '<div class="empty-state">Error loading: ' + e.message + '</div>';
      }
    };

    window.deleteProduct = async (id) => {
      if (!confirm('Delete this product?')) return;
      await deleteDoc(doc(db, 'products', id));
      loadProducts();
    };

  </script>

</body>
</html>
